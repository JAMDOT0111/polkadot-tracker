version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: polkadot-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - polkadot-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: polkadot-backend
    restart: unless-stopped
    environment:
      - PORT=3001
      - SUBSCAN_API_KEY=${SUBSCAN_API_KEY:-}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - polkadot-net

  redis:
    image: redis:7-alpine
    container_name: polkadot-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - polkadot-net

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: polkadot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - polkadot-net

volumes:
  redis-data:

networks:
  polkadot-net:
    driver: bridge
