version: "3.9"

services:
  frontend:
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001

  backend:
    command: npm run dev
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development

  nginx:
    profiles:
      - production
